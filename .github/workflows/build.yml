name: Build Remind Me

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux build
          - os: ubuntu-22.04
            label: Linux
          # Windows build
          - os: windows-latest
            label: Windows
          # macOS build
          - os: macos-latest
            label: macOS

    runs-on: ${{ matrix.os }}
    name: Build on ${{ matrix.label }}

    steps:
      # ─── Étape 1 : Récupérer le code source ───────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ─── Étape 2 : Installer Node.js (pour compiler le frontend) ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ─── Étape 3 : Installer Rust (pour compiler le backend) ──────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # ─── Étape 4 : Cache Rust (accélère les builds suivants) ──────
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ─── Étape 5 : Dépendances système Linux (webkit, ssl, etc.) ──
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      # ─── Étape 6 : Installer les dépendances Node.js ──────────────
      - name: Install Node dependencies
        run: npm ci

      # ─── Étape 7 : Compiler et packager l'application ─────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── Étape 8 : Uploader les installateurs générés ─────────────
      - name: Upload installers (Linux)
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: RemindMe-Linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload installers (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: RemindMe-Windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload installers (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: RemindMe-macOS
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
